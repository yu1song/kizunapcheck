button:hover,.file-label:hover{border-color:#bfc7d5}.primary{background:var(--primary);color:white;border-color:var(--primary)}.danger{color:#b42318}.tabs{display:flex;gap:10px;max-width:1500px;margin:0 auto;padding:0 18px 12px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.rolebar{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--line);overflow:auto;background:linear-gradient(#fff,#fafbfc)}
.chip{white-space:nowrap}.chip.active{background:#111827;color:#fff}.chip .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:-1px;border:1px solid rgba(0,0,0,.15)}
.table-wrap{overflow:auto;max-height:calc(100vh - 260px)}table{border-collapse:separate;border-spacing:0;min-width:980px;width:max-content;background:white}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 12px;vertical-align:middle;background:white}th{position:sticky;top:0;z-index:20;background:#f8fafc;font-size:13px;text-align:left;white-space:nowrap}.row-complete td{background:#f0fdf4}.row-complete .editable{color:#37624a}td.step,th.step{position:sticky;left:0;z-index:25;width:var(--sticky1);min-width:var(--sticky1);text-align:center;font-weight:800}td.cat,th.cat{position:sticky;left:var(--sticky1);z-index:25;width:var(--sticky2);min-width:var(--sticky2)}td.cond,th.cond{position:sticky;left:calc(var(--sticky1) + var(--sticky2));z-index:25;width:var(--sticky3);min-width:var(--sticky3)}td.reward,th.reward{position:sticky;left:calc(var(--sticky1) + var(--sticky2) + var(--sticky3));z-index:25;width:var(--sticky4);min-width:var(--sticky4)}th.step,th.cat,th.cond,th.reward{z-index:35}.editable{outline:none;border-radius:8px;min-height:24px}.editable:focus{background:#fff7ed;box-shadow:0 0 0 2px #fed7aa inset}.person-col{text-align:center;min-width:116px}.person-head{text-align:center;font-weight:900;color:#111827}.person-head .name{display:block}.person-head .pct{font-size:11px;color:#344054;background:rgba(255,255,255,.6);border-radius:999px;padding:2px 6px;display:inline-block;margin-top:4px}.check{width:22px;height:22px;accent-color:var(--ok);cursor:pointer}.muted{color:var(--muted)}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:2px 8px;font-weight:700;font-size:12px}

<body>
<header>
  <div class="header-inner">
    <div class="brand"><h1>18TRIP きずなっぷ Tracker v2.3</h1><div class="sub">区長／コンダクターを分頁で管理。前台追蹤與後台表單皆維持v2.2版面，自動保存於此端末。</div></div>
    <div class="actions">
      <button class="primary" id="dashBtn">Dashboard</button>
      <button id="adminBtn">後台表單</button>
      <button id="exportBtn">JSON書き出し</button>
      <label class="file-label" for="importFile">JSON読み込み</label><input id="importFile" type="file" accept="application/json">
      <button class="danger" id="resetBtn">リセット</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-group="kucho">区長 <small>20名</small></button>
    <button class="tab" data-group="conductor">コンダクター <small>4名</small></button>
  </div>
</header>
<main>
  <div class="toolbar" id="frontToolbar">
    <input id="search" placeholder="STEP／カテゴリ／条件／報酬を検索">
    <select id="category"><option value="">カテゴリ全部</option></select>
    <select id="sort"><option value="step">STEP順</option><option value="category">カテゴリ順</option><option value="incomplete">未完成優先</option></select>
    <label class="switch"><input type="checkbox" id="onlyIncomplete"> 未完成のみ</label>
  </div>
  <section class="card" id="frontCard">
    <div class="rolebar" id="rolebar"></div>
    <div class="table-wrap"><table id="tracker"></table></div>
    <div class="hint">Tip：前台でも直接編集できます。角色名を押すとその角色だけ表示。後台表單でカテゴリ・条件・報酬をまとめて編集できます。</div>
  </section>

  <section class="card hidden" id="adminCard">
    <div class="admin-tools">
      <button class="primary" id="saveAdminBtn">保存して前台に反映</button>
      <button id="addStepBtn">STEP追加</button>
      <button class="danger" id="resetRowsBtn">現在分頁の表示資料を初期化</button>
      <span class="spacer"></span>
      <span class="muted">後台表單：カテゴリ・条件・報酬をまとめて編集できます。</span>
    </div>
    <div class="table-wrap"><table id="adminTracker"></table></div>
    <div class="hint">公開網域使用時，後台修改會儲存在目前裝置的瀏覽器。要搬到其他裝置，請用 JSON書き出し／読み込み。</div>
  </section>
</main>
<aside class="drawer" id="drawer">
  <h2>Dashboard</h2>
  <div class="stats" id="overallStats"></div>
  <h3>角色別完成率</h3>
  <div id="personStats"></div>
  <h3>カテゴリ別集計</h3>
  <div class="cat-grid" id="categoryStats"></div>
</aside>

const KEY = '18trip-kizunapp-tracker-v2';
const PREF_KEY = '18trip-kizunapp-tracker-v2-prefs';
let state = loadState();
let prefs = loadPrefs();
let group = prefs.group || 'kucho';
let selectedPerson = prefs.selectedPerson || null;
let viewMode = prefs.viewMode || 'front';

function freshState(){
  const s = {version:2, groups:{}};
  for (const [g,d] of Object.entries(BASE)){
    s.groups[g] = {rows: d.rows.map(r=>({...r, checks:Object.fromEntries(d.people.map(p=>[p.name,false]))}))};
  }
  return s;
}
function loadState(){
  try{
    const saved = JSON.parse(localStorage.getItem(KEY));
    if(saved && saved.groups) return mergeState(saved);
  }catch(e){}
  return freshState();
}
function loadPrefs(){
  try{return JSON.parse(localStorage.getItem(PREF_KEY)) || {};}
  catch(e){return {};}
}
function savePrefs(){
  const p = {
    group,
    selectedPerson,
    search: document.getElementById('search')?.value || '',
    category: document.getElementById('category')?.value || '',
    sort: document.getElementById('sort')?.value || 'step',
    onlyIncomplete: !!document.getElementById('onlyIncomplete')?.checked,
    drawerOpen: document.getElementById('drawer')?.classList.contains('open') || false,
    viewMode
  };
  localStorage.setItem(PREF_KEY, JSON.stringify(p));
}
function applyPrefs(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.group===group));
  document.getElementById('search').value = prefs.search || '';
  document.getElementById('sort').value = prefs.sort || 'step';
  document.getElementById('onlyIncomplete').checked = !!prefs.onlyIncomplete;
  if(prefs.drawerOpen) document.getElementById('drawer').classList.add('open');
  applyViewMode();
}
function mergeState(saved){
  const f=freshState();
  for (const g of Object.keys(f.groups)){
    const oldRows = saved.groups?.[g]?.rows || [];
    const byStep = Object.fromEntries(oldRows.map(r=>[r.step,r]));
    f.groups[g].rows = f.groups[g].rows.map(r=>{
      const old = byStep[r.step] || {};
      return {
        step:r.step,
        category: old.category ?? r.category,
        condition: old.condition ?? r.condition,
        reward: old.reward ?? r.reward,
        checks: {...r.checks, ...(old.checks||{})}
      }
    });
  }
  return f;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
const esc = v => String(v ?? '').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function rows(){return state.groups[group].rows}
function people(){return BASE[group].people}
function currentPeople(){return selectedPerson ? people().filter(p=>p.name===selectedPerson) : people()}
function rowComplete(r){ const ps=currentPeople(); return ps.length && ps.every(p=>r.checks[p.name]); }
function pctForPerson(name,g=group){const rs=state.groups[g].rows; return rs.length? Math.round(100*rs.filter(r=>r.checks[name]).length/rs.length):0}
function updateCategoryOptions(){
  const sel=document.getElementById('category'), old=sel.value;
  const cats=[...new Set(rows().map(r=>r.category).filter(Boolean))].sort();
  sel.innerHTML='<option value="">カテゴリ全部</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  sel.value = cats.includes(old) ? old : (cats.includes(prefs.category) ? prefs.category : '');
}
function renderRolebar(){
  const rb=document.getElementById('rolebar');
  rb.innerHTML = `<button class="chip ${!selectedPerson?'active':''}" data-person="">全員表示</button>` + people().map(p=>
    `<button class="chip ${selectedPerson===p.name?'active':''}" data-person="${esc(p.name)}"><span class="dot" style="background:${p.color}"></span>${esc(p.name)} <span class="muted">${pctForPerson(p.name)}%</span></button>`
  ).join('');
  rb.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedPerson=b.dataset.person||null;savePrefs();render();});
}
function filteredRows(){
  let rs=[...rows()];
  const q=document.getElementById('search').value.trim().toLowerCase();
  const cat=document.getElementById('category').value;
  const only=document.getElementById('onlyIncomplete').checked;
  if(q) rs=rs.filter(r=>[r.step,r.category,r.condition,r.reward].join(' ').toLowerCase().includes(q));
  if(cat) rs=rs.filter(r=>r.category===cat);
  if(only) rs=rs.filter(r=>!rowComplete(r));
  const sort=document.getElementById('sort').value;
  if(sort==='category') rs.sort((a,b)=>(a.category||'').localeCompare(b.category||'ja') || a.step-b.step);
  if(sort==='incomplete') rs.sort((a,b)=>Number(rowComplete(a))-Number(rowComplete(b)) || a.step-b.step);
  return rs;
}
function renderTable(){
  const tbl=document.getElementById('tracker'); const ps=currentPeople(); const rs=filteredRows();
  if(!rs.length){tbl.innerHTML=`<tr><td class="empty">表示できる項目がありません。</td></tr>`;return;}
  let html=`<thead><tr><th class="step">STEP</th><th class="cat">カテゴリ</th><th class="cond">条件</th><th class="reward">報酬</th>`;
  for(const p of ps){html+=`<th class="person-col person-head" style="background:${p.color}"><span class="name">${esc(p.name)}</span><span class="pct">${pctForPerson(p.name)}%</span></th>`}
  html+='</tr></thead><tbody>';
  for(const r of rs){
    html+=`<tr class="${rowComplete(r)?'row-complete':''}" data-step="${r.step}">`+
    `<td class="step">${r.step}</td>`+
    `<td class="cat"><div class="editable" contenteditable data-field="category">${esc(r.category)}</div></td>`+
    `<td class="cond"><div class="editable" contenteditable data-field="condition">${esc(r.condition)}</div></td>`+
    `<td class="reward"><div class="editable" contenteditable data-field="reward">${esc(r.reward)}</div></td>`;
    for(const p of ps){html+=`<td class="person-col"><input class="check" type="checkbox" data-person="${esc(p.name)}" ${r.checks[p.name]?'checked':''}></td>`}
    html+='</tr>';
  }
  html+='</tbody>'; tbl.innerHTML=html;
  tbl.querySelectorAll('.check').forEach(ch=>ch.onchange=e=>{
    const step=Number(e.target.closest('tr').dataset.step);
    const person=e.target.dataset.person;
    if(e.target.checked){
      rows().forEach(r=>{ if(Number(r.step)<=step) r.checks[person]=true; });
    }else{
      const r=rows().find(x=>x.step===step);
      if(r) r.checks[person]=false;
    }
    save(); render();
  });
  tbl.querySelectorAll('.editable').forEach(ed=>ed.onblur=e=>{
    const step=Number(e.target.closest('tr').dataset.step); const field=e.target.dataset.field; const r=rows().find(x=>x.step===step); r[field]=e.target.innerText.trim(); save(); updateCategoryOptions(); renderDashboard();
  });
}
function calcGroup(g){
  const rs=state.groups[g].rows, ps=BASE[g].people; const total=rs.length*ps.length;
  const done=rs.reduce((sum,r)=>sum+ps.filter(p=>r.checks[p.name]).length,0);
  return {total,done,pct:total?Math.round(100*done/total):0};
}
function renderDashboard(){
  const k=calcGroup('kucho'), c=calcGroup('conductor'), all={done:k.done+c.done,total:k.total+c.total}; all.pct=all.total?Math.round(100*all.done/all.total):0;
  document.getElementById('overallStats').innerHTML=[['区長',k],['コンダクター',c],['全体',all]].map(([name,s])=>`<div class="stat"><span>${name}</span><b>${s.pct}%</b><div class="bar"><i style="width:${s.pct}%"></i></div><span>${s.done}/${s.total}</span></div>`).join('');
  const personHtml = Object.entries(BASE).map(([g,d])=>d.people.map(p=>{
    const pct=pctForPerson(p.name,g); return `<div class="dash-row"><div><span class="dot" style="background:${p.color};display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px"></span>${esc(p.name)} <span class="muted">${g==='kucho'?'区長':'コンダクター'}</span></div><div><b>${pct}%</b></div></div>`
  }).join('')).join('');
  document.getElementById('personStats').innerHTML=personHtml;
  const catMap={};
  for (const [g,d] of Object.entries(BASE)){
    const ps=d.people;
    for(const r of state.groups[g].rows){
      const cat=r.category || '未分類';
      catMap[cat] ||= {done:0,total:0};
      catMap[cat].total += ps.length;
      catMap[cat].done += ps.filter(p=>r.checks[p.name]).length;
    }
  }
  document.getElementById('categoryStats').innerHTML=Object.entries(catMap).sort((a,b)=>a[0].localeCompare(b[0],'ja')).map(([cat,s])=>{
    const pct=s.total?Math.round(100*s.done/s.total):0; return `<div class="cat-card"><b>${esc(cat)}</b><div class="bar"><i style="width:${pct}%"></i></div><div class="muted">${s.done}/${s.total}・${pct}%</div></div>`
  }).join('');
}
function setVisibleChecks(value){
  const ps = currentPeople();
  const rs = filteredRows();
  if(!rs.length) return;
  for(const r of rs){
    for(const p of ps){ r.checks[p.name] = value; }
  }
  save();
  render();
}

function applyViewMode(){
  const front = viewMode !== 'admin';
  document.getElementById('frontToolbar')?.classList.toggle('hidden', !front);
  document.getElementById('frontCard')?.classList.toggle('hidden', !front);
  document.getElementById('adminCard')?.classList.toggle('hidden', front);
  document.getElementById('adminBtn')?.classList.toggle('primary', !front);
}
function renderAdminTable(){
  const tbl=document.getElementById('adminTracker');
  if(!tbl) return;
  let html=`<thead><tr><th class="step">STEP</th><th class="cat">カテゴリ</th><th class="cond">条件</th><th class="reward">報酬</th><th class="person-col">操作</th></tr></thead><tbody>`;
  for(const r of rows()){
    html += `<tr data-step="${r.step}">`+
      `<td class="step">${r.step}</td>`+
      `<td class="cat"><input class="admin-input" data-field="category" value="${esc(r.category)}"></td>`+
      `<td class="cond"><textarea class="admin-textarea" data-field="condition">${esc(r.condition)}</textarea></td>`+
      `<td class="reward"><textarea class="admin-textarea" data-field="reward">${esc(r.reward)}</textarea></td>`+
      `<td class="admin-actions"><button class="danger delete-step" data-step="${r.step}">削除</button></td>`+
    `</tr>`;
  }
  html += `</tbody>`;
  tbl.innerHTML = html;
  tbl.querySelectorAll('[data-field]').forEach(el=>{
    el.oninput=()=>{
      const step=Number(el.closest('tr').dataset.step);
      const r=rows().find(x=>x.step===step);
      if(!r) return;
      r[el.dataset.field]=el.value;
      save();
      updateCategoryOptions();
      renderDashboard();
    };
  });
  tbl.querySelectorAll('.delete-step').forEach(btn=>{
    btn.onclick=()=>{
      if(!confirm('このSTEPを削除しますか？')) return;
      const step=Number(btn.dataset.step);
      const idx=rows().findIndex(r=>Number(r.step)===step);
      if(idx>=0) rows().splice(idx,1);
      rows().forEach((r,i)=>r.step=i+1);
      save();
      render();
    };
  });
}

function render(){updateCategoryOptions();renderRolebar();renderTable();renderAdminTable();renderDashboard();applyViewMode();savePrefs();}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  group=t.dataset.group;
  if(selectedPerson && !people().some(p=>p.name===selectedPerson)) selectedPerson=null;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.group===group));
  savePrefs();
  render();
});
['search','category','sort','onlyIncomplete'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{savePrefs();renderTable();renderDashboard();}));

document.getElementById('dashBtn').onclick=()=>{document.getElementById('drawer').classList.toggle('open');savePrefs();};

document.getElementById('adminBtn').onclick=()=>{viewMode = viewMode==='admin' ? 'front' : 'admin'; savePrefs(); render();};

document.getElementById('addStepBtn').onclick=()=>{
  const checks = Object.fromEntries(people().map(p=>[p.name,false]));
  rows().push({step:rows().length+1, category:'', condition:'', reward:'', checks});
  save(); render();
};
document.getElementById('resetRowsBtn').onclick=()=>{
  if(!confirm('現在分頁のカテゴリ・条件・報酬を初期状態に戻しますか？チェック状態は残します。')) return;
  const baseRows = BASE[group].rows;
  rows().forEach(r=>{
    const b = baseRows.find(x=>x.step===r.step);
    if(b){ r.category=b.category; r.condition=b.condition; r.reward=b.reward; }
  });
  save(); render();
};

document.getElementById('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='18trip-kizunapp-tracker-backup.json'; a.click(); URL.revokeObjectURL(a.href);};
document.getElementById('importFile').onchange=e=>{const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=()=>{try{state=mergeState(JSON.parse(reader.result)); save(); render(); alert('読み込みました。');}catch(err){alert('JSONを読み込めませんでした。')}}; reader.readAsText(file);};
document.getElementById('resetBtn').onclick=()=>{if(confirm('チェック状態・編集内容・画面設定を初期状態に戻しますか？')){localStorage.removeItem(KEY); localStorage.removeItem(PREF_KEY); state=freshState(); prefs={}; group='kucho'; selectedPerson=null; applyPrefs(); render();}};
applyPrefs();
render();
